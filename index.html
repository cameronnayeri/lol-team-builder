<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LoL Team Builder v3</title>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background:#111; color:#e0e0e0; font-family:'Segoe UI',sans-serif; height:100vh; overflow:hidden; font-size:14px; }

        /* ── Header ── */
        header { background:#000; border-bottom:1px solid #2a2a2a; padding:0 16px; height:40px; display:flex; align-items:center; justify-content:space-between; flex-shrink:0; }
        header h1 { font-size:14px; letter-spacing:3px; text-transform:uppercase; color:#fff; font-weight:600; }
        .tab-bar { display:flex; gap:2px; }
        .tab-btn { background:none; border:none; color:#555; font-size:11px; letter-spacing:2px; text-transform:uppercase; font-weight:700; padding:6px 14px; cursor:pointer; border-bottom:2px solid transparent; transition:color .15s, border-color .15s; }
        .tab-btn:hover { color:#aaa; }
        .tab-btn.active { color:#fff; border-bottom-color:#fff; }
        #saveStatus { font-size:11px; color:#444; transition:color .3s; }
        #saveStatus.saving { color:#888; }
        #saveStatus.saved  { color:#2ecc71; }
        #saveStatus.live   { color:#3498db; }
        #saveStatus.error  { color:#e74c3c; }

        /* ── Bans bar (builder only) ── */
        .bans-bar { background:#0a0a0a; border-bottom:1px solid #2a2a2a; padding:6px 12px; display:flex; align-items:center; gap:10px; height:60px; flex-shrink:0; }
        .bans-label { font-size:10px; letter-spacing:1.5px; text-transform:uppercase; color:#555; font-weight:700; flex-shrink:0; }
        .bans-drop { flex:1; display:flex; flex-wrap:nowrap; gap:4px; align-items:center; min-height:44px; border:1px dashed #2a2a2a; border-radius:2px; padding:4px 6px; overflow-x:auto; transition:border-color .1s,background .1s; }
        .bans-drop::-webkit-scrollbar { height:3px; }
        .bans-drop::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
        .bans-drop.drag-over { border-color:#fff; background:#1a1a1a; }
        .bans-empty { color:#333; font-size:11px; pointer-events:none; user-select:none; white-space:nowrap; }
        .ban-champ { position:relative; flex-shrink:0; width:40px; }
        .ban-champ img { width:40px; height:40px; object-fit:cover; border-radius:2px; display:block; filter:grayscale(100%); opacity:.55; border:1px solid #333; }
        .ban-champ:hover .rm-btn { display:flex; }
        .clear-bans-btn { background:transparent; border:1px solid #2a2a2a; color:#555; font-size:11px; padding:5px 12px; border-radius:2px; cursor:pointer; flex-shrink:0; transition:border-color .1s,color .1s; }
        .clear-bans-btn:hover { border-color:#888; color:#e0e0e0; }
        .banned img { filter:grayscale(100%) brightness(.4) !important; opacity:.5 !important; }

        /* ── Layout (shared) ── */
        .layout { display:flex; overflow:hidden; }
        .builder-layout { height:calc(100vh - 100px); }
        .draft-layout { height:calc(100vh - 40px); }
        .panel { display:flex; flex-direction:column; overflow:hidden; padding:10px; flex:1; min-width:160px; }
        .resize-handle { width:5px; background:#1a1a1a; cursor:col-resize; flex-shrink:0; border-left:1px solid #222; border-right:1px solid #222; transition:background .1s; }
        .resize-handle:hover, .resize-handle.active { background:#444; }
        .panel-title { font-size:12px; text-transform:uppercase; letter-spacing:1.5px; color:#fff; font-weight:700; margin-bottom:8px; flex-shrink:0; }
        .panel-hint { font-size:11px; color:#555; font-weight:400; letter-spacing:0; text-transform:none; margin-left:6px; }

        /* ── Inputs ── */
        input[type=text],select { background:#1a1a1a; border:1px solid #2a2a2a; color:#e0e0e0; font-size:13px; font-family:inherit; outline:none; border-radius:2px; padding:4px 7px; }
        input[type=text]:focus,select:focus { border-color:#555; }
        input[type=text]::placeholder { color:#444; }

        /* ── Roster panel ── */
        .search-box { width:100%; margin-bottom:6px; flex-shrink:0; }
        .champ-count { font-size:11px; color:#444; margin-bottom:6px; flex-shrink:0; }
        .champion-grid { display:grid; grid-template-columns:repeat(8,1fr); gap:2px; overflow-y:auto; flex:1; }
        .champion-grid::-webkit-scrollbar { width:4px; }
        .champion-grid::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
        .roster-champ { position:relative; cursor:grab; }
        .roster-champ:active { cursor:grabbing; }
        .roster-champ img { width:100%; aspect-ratio:1; object-fit:cover; display:block; border:1px solid #222; border-radius:1px; transition:border-color .1s,filter .1s; }
        .roster-champ:not(.banned):hover img { border-color:#888; filter:brightness(1.2); }

        /* ── Pools panel ── */
        .members-scroll { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:6px; }
        .members-scroll::-webkit-scrollbar { width:4px; }
        .members-scroll::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
        .member-row { display:flex; align-items:flex-start; gap:8px; border:1px solid #222; border-radius:2px; padding:8px; flex-shrink:0; }
        .member-meta { display:flex; flex-direction:column; gap:4px; width:110px; flex-shrink:0; }
        .member-name-input { flex:1; min-width:0; font-weight:700; font-size:13px; border:none; border-bottom:1px solid #2a2a2a; background:transparent; border-radius:0; padding:2px 0; }
        .member-name-input:focus { border-bottom-color:#666; }
        .member-name-row { display:flex; align-items:center; gap:4px; width:100%; }
        .role-label-static { font-size:12px; color:#555; padding:2px 0; }
        .member-pool { flex:1; min-height:54px; border:1px dashed #2a2a2a; border-radius:2px; padding:5px; display:flex; flex-wrap:wrap; gap:4px; align-content:flex-start; transition:border-color .1s,background .1s; }
        .member-pool.drag-over { border-color:#fff; background:#1a1a1a; }
        .pool-empty { color:#333; font-size:12px; align-self:center; pointer-events:none; user-select:none; width:100%; text-align:center; }

        /* ── Pool champ ── */
        .pool-champ { position:relative; cursor:grab; width:46px; }
        .pool-champ:active { cursor:grabbing; }
        .pool-champ img { width:46px; height:46px; object-fit:cover; border-radius:2px; border:2px solid #2a2a2a; display:block; transition:filter .1s; }
        .pool-champ:not(.banned):hover img { filter:brightness(1.1); }
        .pool-champ[data-tag="best"]         img { border-color:#e74c3c; }
        .pool-champ[data-tag="great"]        img { border-color:#e67e22; }
        .pool-champ[data-tag="decent"]       img { border-color:#d4ac0d; }
        .pool-champ[data-tag="questionable"] img { border-color:#2ecc71; }
        .pool-champ[data-tag="stretch"]      img { border-color:#3498db; }
        .pool-champ.insert-before { box-shadow:-3px 0 0 #fff; }
        .pool-tag-bar { height:3px; border-radius:0 0 2px 2px; background:transparent; margin-top:1px; }
        .pool-champ[data-tag="best"]         .pool-tag-bar { background:#e74c3c; }
        .pool-champ[data-tag="great"]        .pool-tag-bar { background:#e67e22; }
        .pool-champ[data-tag="decent"]       .pool-tag-bar { background:#d4ac0d; }
        .pool-champ[data-tag="questionable"] .pool-tag-bar { background:#2ecc71; }
        .pool-champ[data-tag="stretch"]      .pool-tag-bar { background:#3498db; }

        /* ── Remove button ── */
        .rm-btn { position:absolute; top:-4px; right:-4px; width:14px; height:14px; background:#1a1a1a; border:1px solid #555; border-radius:50%; color:#ccc; font-size:9px; line-height:1; cursor:pointer; display:none; align-items:center; justify-content:center; z-index:30; padding:0; }
        .pool-champ:hover .rm-btn, .comp-champ:hover .rm-btn { display:flex; }
        .rm-btn:hover { background:#c0392b; border-color:#c0392b; color:#fff; }

        /* ── Tag picker ── */
        #tagPicker { position:fixed; z-index:1000; background:#1a1a1a; border:1px solid #333; border-radius:3px; padding:6px; display:none; gap:5px; align-items:center; box-shadow:0 4px 14px rgba(0,0,0,.7); }
        #tagPicker.open { display:flex; }
        .tag-opt { width:18px; height:18px; border-radius:50%; border:1px solid #444; cursor:pointer; flex-shrink:0; transition:transform .1s; }
        .tag-opt:hover { transform:scale(1.3); border-color:#aaa; }
        .tag-opt-clear { background:#2a2a2a; color:#888; font-size:11px; line-height:1; }
        .tag-legend-row { display:flex; gap:10px; align-items:center; font-size:11px; color:#444; margin-bottom:7px; flex-wrap:wrap; flex-shrink:0; }
        .tag-legend-item { display:flex; align-items:center; gap:4px; }
        .tag-dot { width:8px; height:8px; border-radius:50%; }
        .tag-picker-sep { width:1px; background:#333; margin:0 2px; align-self:stretch; flex-shrink:0; }
        .badge-opt { background:#1a1a1a; border:1px solid #333; border-radius:3px; font-size:13px; cursor:pointer; padding:2px 5px; line-height:1; transition:border-color .1s,background .1s; flex-shrink:0; }
        .badge-opt:hover { border-color:#888; }
        .badge-opt.active { border-color:#fff; background:#2a2a2a; }
        .pool-badges { position:absolute; bottom:4px; left:0; right:0; display:flex; justify-content:center; gap:2px; pointer-events:none; z-index:10; }
        .pool-badge { font-size:9px; line-height:1.3; background:rgba(0,0,0,.82); border-radius:2px; padding:0 2px; }
        .comp-badges { position:absolute; bottom:0; left:0; right:0; display:flex; justify-content:center; gap:1px; pointer-events:none; z-index:10; }
        .comp-badge { font-size:8px; line-height:1.3; background:rgba(0,0,0,.85); border-radius:2px; padding:0 1px; }
        #compBadgePicker { position:fixed; z-index:1001; background:#1a1a1a; border:1px solid #333; border-radius:3px; padding:5px; display:none; gap:4px; align-items:center; box-shadow:0 4px 14px rgba(0,0,0,.7); }
        #compBadgePicker.open { display:flex; }

        /* ── Comps panel ── */
        .comps-scroll { overflow-y:auto; flex:1; display:flex; flex-direction:column; gap:10px; }
        .comps-scroll::-webkit-scrollbar { width:4px; }
        .comps-scroll::-webkit-scrollbar-thumb { background:#2a2a2a; border-radius:2px; }
        .comp-block { border:1px solid #222; border-radius:2px; padding:8px; flex-shrink:0; }
        .comp-header { display:flex; align-items:center; gap:6px; margin-bottom:6px; }
        .comp-name-input { flex:1; font-weight:700; font-size:13px; border:none; border-bottom:1px solid #2a2a2a; background:transparent; border-radius:0; padding:2px 0; }
        .comp-name-input:focus { border-bottom-color:#666; }
        .comp-del-btn { background:none; border:none; color:#444; font-size:16px; cursor:pointer; line-height:1; padding:0 2px; }
        .comp-del-btn:hover { color:#c0392b; }
        .comp-drag-handle { cursor:grab; color:#2a2a2a; font-size:13px; padding:0 4px; user-select:none; flex-shrink:0; line-height:1; }
        .comp-drag-handle:hover { color:#666; }
        .comp-drag-handle:active { cursor:grabbing; }
        .comp-block.comp-drag-over { border-color:#555; background:#1a1a1a; }
        .comp-collapse-btn { background:none; border:none; color:#444; font-size:10px; cursor:pointer; padding:0 4px; line-height:1; flex-shrink:0; transition:color .1s; }
        .comp-collapse-btn:hover { color:#aaa; }
        .comp-slots { display:grid; grid-template-columns:repeat(5,1fr); gap:3px; }
        .role-col { display:flex; flex-direction:column; align-items:center; gap:2px; }
        .role-label { font-size:10px; text-transform:uppercase; letter-spacing:.5px; color:#555; cursor:pointer; user-select:none; border-radius:2px; padding:1px 3px; transition:color .1s; }
        .role-label:hover { color:#888; }
        .role-col.core .role-label { color:#2ecc71; }
        .role-drop-zone { width:100%; min-height:48px; border:1px dashed #2a2a2a; border-radius:2px; padding:3px; display:flex; flex-wrap:wrap; gap:2px; justify-content:center; align-content:flex-start; background:#0d0d0d; transition:border-color .1s,background .1s; }
        .role-drop-zone.drag-over { border-color:#fff; background:#1a1a1a; }
        .role-drop-zone.has-champs { border-style:solid; border-color:#222; }
        .role-col.core .role-drop-zone { border-color:#2ecc7130; background:#091209; }
        .role-col.core .role-drop-zone.has-champs { border-color:#2ecc7150; }
        .slot-placeholder { font-size:14px; color:#2a2a2a; pointer-events:none; user-select:none; align-self:center; }
        .comp-champ { position:relative; width:40px; cursor:grab; }
        .comp-champ:active { cursor:grabbing; }
        .comp-champ.insert-before { box-shadow:-3px 0 0 #fff; }
        .comp-champ img { width:40px; height:40px; object-fit:cover; border-radius:2px; border:1px solid #2a2a2a; display:block; }
        .comp-champ[data-tag="best"]         img { border-color:#e74c3c; }
        .comp-champ[data-tag="great"]        img { border-color:#e67e22; }
        .comp-champ[data-tag="decent"]       img { border-color:#d4ac0d; }
        .comp-champ[data-tag="questionable"] img { border-color:#2ecc71; }
        .comp-champ[data-tag="stretch"]      img { border-color:#3498db; }
        .comp-champ .champ-lbl { font-size:9px; color:#555; text-align:center; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; max-width:40px; }
        .add-comp-btn { margin-top:6px; padding:7px 0; background:transparent; border:1px dashed #2a2a2a; border-radius:2px; color:#444; font-size:12px; cursor:pointer; width:100%; transition:border-color .1s,color .1s; flex-shrink:0; }
        .add-comp-btn:hover { border-color:#888; color:#e0e0e0; }
        .threats-toggle { width:100%; background:none; border:none; border-top:1px solid #1a1a1a; color:#444; font-size:10px; letter-spacing:1.5px; text-transform:uppercase; cursor:pointer; padding:4px 0; text-align:left; display:flex; align-items:center; gap:5px; margin-top:4px; transition:color .1s; }
        .threats-toggle:hover { color:#888; }
        .threats-toggle .t-arrow { font-size:8px; }
        .threats-drop { display:flex; flex-wrap:wrap; gap:3px; padding:5px; border:1px dashed #2a2a2a; border-radius:2px; background:#0d0d0d; min-height:36px; margin-top:3px; align-content:flex-start; transition:border-color .1s, background .1s; }
        .threats-drop.drag-over { border-color:#e74c3c; background:#1a0a0a; }
        .threat-champ { position:relative; width:36px; flex-shrink:0; }
        .threat-champ img { width:36px; height:36px; object-fit:cover; border-radius:2px; border:1px solid #5a1a1a; display:block; filter:sepia(40%) saturate(200%) hue-rotate(320deg) brightness(.8); }
        .threat-champ:hover .rm-btn { display:flex; }

        /* ── Tooltip ── */
        .tip { position:absolute; bottom:calc(100% + 3px); left:50%; transform:translateX(-50%); background:#000; border:1px solid #333; color:#e0e0e0; font-size:11px; padding:2px 7px; border-radius:2px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .1s; z-index:999; }
        .roster-champ:hover .tip { opacity:1; }

        /* ── Loading ── */
        .loading-msg { grid-column:1/-1; text-align:center; color:#333; font-size:12px; padding:20px 0; }
        .spinner { display:inline-block; width:11px; height:11px; border:2px solid #222; border-top-color:#888; border-radius:50%; animation:spin .8s linear infinite; margin-right:5px; vertical-align:middle; }
        @keyframes spin { to { transform:rotate(360deg); } }

        /* ══════════════════════════════════════════
           DRAFT TAB
        ══════════════════════════════════════════ */

        /* Draft left: pools (read-only reference) */
        .draft-pools-panel { display:flex; flex-direction:column; overflow:hidden; padding:10px; width:260px; min-width:180px; flex-shrink:0; border-right:1px solid #1e1e1e; }
        .draft-member-row { display:flex; align-items:flex-start; gap:6px; border:1px solid #1e1e1e; border-radius:2px; padding:6px; flex-shrink:0; margin-bottom:5px; }
        .draft-member-name { font-size:11px; font-weight:700; color:#aaa; width:80px; flex-shrink:0; padding-top:2px; }
        .draft-member-pool { display:flex; flex-wrap:wrap; gap:3px; }
        .draft-pool-champ { position:relative; width:36px; }
        .draft-pool-champ img { width:36px; height:36px; object-fit:cover; border-radius:2px; border:2px solid #2a2a2a; display:block; }
        .draft-pool-champ[data-tag="best"]         img { border-color:#e74c3c; }
        .draft-pool-champ[data-tag="great"]        img { border-color:#e67e22; }
        .draft-pool-champ[data-tag="decent"]       img { border-color:#d4ac0d; }
        .draft-pool-champ[data-tag="questionable"] img { border-color:#2ecc71; }
        .draft-pool-champ[data-tag="stretch"]      img { border-color:#3498db; }
        .draft-pool-champ.fearless-banned img { filter:grayscale(100%) brightness(.3); opacity:.4; }
        .draft-pool-champ.draft-banned img   { filter:grayscale(100%) brightness(.3); opacity:.4; }

        /* Draft right: comps (read-only reference) */
        .draft-comps-panel { display:flex; flex-direction:column; overflow:hidden; padding:10px; width:280px; min-width:180px; flex-shrink:0; border-left:1px solid #1e1e1e; }

        /* Draft center */
        .draft-center { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:420px; }

        /* Setup screen */
        .draft-setup { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:20px; }
        .draft-setup h2 { font-size:16px; letter-spacing:3px; text-transform:uppercase; color:#888; font-weight:600; }
        .format-btns { display:flex; gap:12px; }
        .format-btn { background:#1a1a1a; border:1px solid #333; color:#aaa; font-size:13px; font-weight:700; padding:14px 28px; border-radius:3px; cursor:pointer; letter-spacing:1px; transition:border-color .15s,color .15s,background .15s; }
        .format-btn:hover { border-color:#888; color:#fff; background:#222; }

        /* Draft board header */
        .draft-board-header { display:flex; align-items:center; justify-content:space-between; padding:8px 12px; border-bottom:1px solid #1e1e1e; flex-shrink:0; background:#0a0a0a; }
        .draft-series-label { font-size:12px; letter-spacing:1.5px; text-transform:uppercase; color:#aaa; font-weight:700; }
        .draft-score { font-size:13px; font-weight:700; color:#fff; }
        .draft-header-btns { display:flex; gap:6px; }
        .draft-btn { background:#1a1a1a; border:1px solid #333; color:#888; font-size:10px; letter-spacing:1px; text-transform:uppercase; padding:5px 10px; border-radius:2px; cursor:pointer; transition:border-color .1s,color .1s; }
        .draft-btn:hover { border-color:#888; color:#fff; }
        .draft-btn.danger:hover { border-color:#c0392b; color:#c0392b; }
        .draft-btn.primary { border-color:#c89b3c; color:#c89b3c; }
        .draft-btn.primary:hover { background:#c89b3c22; color:#f0c060; border-color:#f0c060; }
        .draft-btn:disabled { opacity:.3; cursor:default; pointer-events:none; }

        /* Fearless banner */
        .fearless-row { padding:6px 12px; border-bottom:1px solid #1e1e1e; background:#0d0d0d; display:flex; align-items:center; gap:8px; flex-shrink:0; flex-wrap:wrap; min-height:36px; }
        .fearless-label { font-size:9px; letter-spacing:1.5px; text-transform:uppercase; color:#555; font-weight:700; flex-shrink:0; }
        .fearless-champ { width:26px; height:26px; border-radius:2px; object-fit:cover; filter:grayscale(100%) brightness(.4); opacity:.6; border:1px solid #333; }

        /* Draft board */
        .draft-board { display:flex; gap:0; padding:10px 12px; flex-shrink:0; background:#0d0d0d; border-bottom:1px solid #1e1e1e; }
        .draft-team-col { flex:1; display:flex; flex-direction:column; gap:4px; }
        .draft-team-col.red-col { align-items:flex-end; }
        .draft-vs { width:50px; display:flex; align-items:center; justify-content:center; flex-shrink:0; }
        .draft-vs-label { font-size:11px; color:#333; letter-spacing:2px; }

        .draft-team-label { font-size:10px; letter-spacing:2px; text-transform:uppercase; font-weight:700; padding:3px 0 6px; }
        .draft-team-label.blue { color:#4e9eff; }
        .draft-team-label.red  { color:#ff5555; }

        /* Ban cells */
        .draft-bans-row { display:flex; gap:3px; }
        .draft-ban-cell { width:36px; height:36px; border-radius:2px; border:1px solid #2a2a2a; background:#111; display:flex; align-items:center; justify-content:center; font-size:16px; color:#2a2a2a; overflow:hidden; position:relative; flex-shrink:0; transition:border-color .15s; }
        .draft-ban-cell img { width:36px; height:36px; object-fit:cover; display:block; filter:grayscale(70%) brightness(.6); }
        .draft-ban-cell.active { border-color:#fff; box-shadow:0 0 8px #fff4; animation:pulse .8s ease-in-out infinite alternate; }
        .draft-ban-cell.blue-active { border-color:#4e9eff; box-shadow:0 0 8px #4e9eff66; animation:pulse-blue .8s ease-in-out infinite alternate; }
        .draft-ban-cell.red-active  { border-color:#ff5555; box-shadow:0 0 8px #ff555566; animation:pulse-red  .8s ease-in-out infinite alternate; }

        /* Pick cells */
        .draft-picks-col { display:flex; flex-direction:column; gap:3px; margin-top:6px; }
        .draft-pick-cell { width:56px; height:56px; border-radius:2px; border:1px solid #2a2a2a; background:#111; display:flex; align-items:center; justify-content:center; overflow:hidden; position:relative; flex-shrink:0; transition:border-color .15s; }
        .draft-pick-cell img { width:56px; height:56px; object-fit:cover; display:block; }

<script>
// ─── Firebase ────────────────────────────────────────────────────────────────
const firebaseConfig = {
    apiKey:            "AIzaSyDeZ0kU9w_C4b1a0j1kkXN8NRSrNkON17U",
    authDomain:        "league-team-22547.firebaseapp.com",
    projectId:         "league-team-22547",
    storageBucket:     "league-team-22547.firebasestorage.app",
    messagingSenderId: "678648881940",
    appId:             "1:678648881940:web:e3fbd81cc7ecf163191801"
};
firebase.initializeApp(firebaseConfig);
const db  = firebase.firestore();
const DOC = db.collection('teambuilder').doc('data');

// ─── Constants ───────────────────────────────────────────────────────────────
const ROLES      = ['Top', 'Jungle', 'Mid', 'Bot', 'Support', 'Sub'];
const ROLE_ICONS = ['⚔', '🌿', '✨', '💰', '🛡', '⭐'];
const ROLE_VALS  = ['top', 'jungle', 'mid', 'bot', 'support', 'sub'];
const TAG_ORDER  = { 'best':0, 'great':1, 'decent':2, 'questionable':3, 'stretch':4, '':5 };

// Draft sequence: 20 slots — [team, action]
// blue bans: 0,2,4,13,15  blue picks: 6,9,10,17,18
// red  bans: 1,3,5,12,14  red  picks: 7,8,11,16,19
const DRAFT_SEQ = [
    {t:'blue',a:'ban'}, {t:'red',a:'ban'}, {t:'blue',a:'ban'}, {t:'red',a:'ban'},
    {t:'blue',a:'ban'}, {t:'red',a:'ban'},
    {t:'blue',a:'pick'},{t:'red',a:'pick'},{t:'red',a:'pick'}, {t:'blue',a:'pick'},
    {t:'blue',a:'pick'},{t:'red',a:'pick'},
    {t:'red',a:'ban'},  {t:'blue',a:'ban'},{t:'red',a:'ban'},  {t:'blue',a:'ban'},
    {t:'red',a:'pick'}, {t:'blue',a:'pick'},{t:'blue',a:'pick'},{t:'red',a:'pick'},
];
const BLUE_BAN_SLOTS  = [0,2,4,13,15];
const BLUE_PICK_SLOTS = [6,9,10,17,18];
const RED_BAN_SLOTS   = [1,3,5,12,14];
const RED_PICK_SLOTS  = [7,8,11,16,19];

function getRoleDisplay(role) {
    const idx = ROLE_VALS.indexOf(role);
    return idx === -1 ? role : `${ROLE_ICONS[idx]} ${ROLES[idx]}`;
}
function sortedPool(pool) {
    return [...pool].sort((a,b) => (TAG_ORDER[a.tag||'']??5)-(TAG_ORDER[b.tag||'']??5));
}

// ─── Builder State ───────────────────────────────────────────────────────────
const state = {
    version: null,
    champions: [],
    bans: [],
    comps: [{ name:'Comp 1', slots:[[],[],[],[],[],[]], core:[false,false,false,false,false,false], threats:[], champBadges:{} }],
    members: [
        { name:'PUSH',          role:'top',     pool:[], emoji:'' },
        { name:'GENISYS',       role:'jungle',  pool:[], emoji:'' },
        { name:'CLUGMA',        role:'mid',     pool:[], emoji:'' },
        { name:'LONGRARESOUND', role:'bot',     pool:[], emoji:'' },
        { name:'IMP',           role:'support', pool:[], emoji:'' },
        { name:'JART',          role:'sub',     pool:[], emoji:'' },
    ]
};

// ─── Draft State ─────────────────────────────────────────────────────────────
const draft = {
    active:      false,
    format:      3,
    currentGame: 1,
    blueSide:    'home',  // 'home' or 'away'
    fearless:    [],      // champIds played in prior games (stacking)
    games:       [],      // [{num, winner, picks:{blue:[],red:[]}, bans:{blue:[],red:[]}}]
    slots:       Array(20).fill(null),
    cursor:      0,       // next slot index to fill
};

let activeTab       = 'builder';
let dragData        = null;
let tagPickerTarget = null;
let saveTimer       = null;
let lastSavedJSON   = '';
let draftStaged       = null; // champion staged for lock-in (click to set)
let draftHoverPreview = null; // transient mouse hover preview
let compBadgeTarget   = null; // {ci, ri, champId} for comp badge picker
let compDragSrc       = null; // index of comp being reordered
const collapsedComps  = new Set(); // indices of collapsed comp blocks
const openThreats     = new Set(); // indices of comps with threats open

// ─── Apply Firebase data ──────────────────────────────────────────────────────
function applyRecord(data) {
    if (data.members?.length) state.members = data.members;
    if (data.comps?.length) state.comps = data.comps.map(comp => ({
        ...comp,
        slots: Array.isArray(comp.slots)
            ? comp.slots
            : Array.from({ length: 6 }, (_, i) => comp.slots[i] || []),
        core: comp.core ?? [false,false,false,false,false,false],
        threats:     comp.threats     ?? [],
        champBadges: comp.champBadges ?? {},
    }));
    state.bans = data.bans || [];

    if (data.draft) {
        const d = data.draft;
        draft.active      = d.active      ?? false;
        draft.format      = d.format      ?? 3;
        draft.currentGame = d.currentGame ?? 1;
        draft.blueSide    = d.blueSide    ?? 'home';
        draft.fearless    = d.fearless    ?? [];
        draft.games       = d.games       ?? [];
        draft.slots       = d.slots       ?? Array(20).fill(null);
        draft.cursor      = d.cursor      ?? 0;
    }
}

// ─── Firebase: Listener ──────────────────────────────────────────────────────
function startListener() {
    return new Promise(resolve => {
        let ready = false;
        DOC.onSnapshot(doc => {
            const data = doc.data();
            if (data) {
                const incoming = JSON.stringify(data);
                if (incoming !== lastSavedJSON) {
                    lastSavedJSON = incoming;
                    applyRecord(data);
                    if (ready) {
                        renderBans();
                        renderRoster(filterRoster());
                        renderAllComps();
                        renderMembers();
                        if (activeTab === 'draft') renderDraftTab();
                        setStatus('live', '● Live');
                    }
                }
            }
            if (!ready) { ready = true; resolve(); }
        }, err => { console.error(err); resolve(); });
    });
}

// ─── Firebase: Save ──────────────────────────────────────────────────────────
function scheduleSave() {
    clearTimeout(saveTimer);
    saveTimer = setTimeout(saveToDB, 1500);
}
function scheduleSaveImmediate() {
    clearTimeout(saveTimer);
    saveToDB();
}

async function saveToDB() {
    try {
        setStatus('saving', 'Saving…');
        const payload = {
            members: state.members.map(m => ({ ...m, pool: sortedPool(m.pool) })),
            comps:   state.comps.map(comp => ({
                ...comp,
                slots: Object.fromEntries(comp.slots.map((slot,i) => [i, slot]))
            })),
            bans: state.bans,
            draft: {
                active:      draft.active,
                format:      draft.format,
                currentGame: draft.currentGame,
                blueSide:    draft.blueSide,
                fearless:    draft.fearless,
                games:       draft.games,
                slots:       draft.slots,
                cursor:      draft.cursor,
            },
        };
        lastSavedJSON = JSON.stringify(payload);
        await DOC.set(payload);
        setStatus('saved', 'Saved ✓');
    } catch(err) {
        console.error(err);
        setStatus('error', 'Save failed');
    }
}

function setStatus(cls, text) {
    const el = document.getElementById('saveStatus');
    el.className = cls;
    el.textContent = text;
}

// ─── Tab System ──────────────────────────────────────────────────────────────
function switchTab(tab) {
    activeTab = tab;
    document.getElementById('tabBuilder').style.display = tab === 'builder' ? '' : 'none';
    document.getElementById('tabDraft').style.display   = tab === 'draft'   ? '' : 'none';
    document.querySelectorAll('.tab-btn').forEach((btn, i) => {
        btn.classList.toggle('active', (i === 0 && tab === 'builder') || (i === 1 && tab === 'draft'));
    });
    if (tab === 'draft') renderDraftTab();
}

// ─── Init ─────────────────────────────────────────────────────────────────────
async function init() {
    initResizeHandles();
    await Promise.all([startListener(), loadChampions()]);
    renderBans();
    renderRoster(filterRoster());
    renderAllComps();
    renderMembers();
    setStatus('saved', 'Connected');
}

// ─── Resize Handles ───────────────────────────────────────────────────────────
function initResizeHandles() {
    document.querySelectorAll('.resize-handle').forEach(handle => {
        let startX, prevPanel, nextPanel, prevW, nextW;
        handle.addEventListener('mousedown', e => {
            e.preventDefault();
            startX    = e.clientX;
            prevPanel = handle.previousElementSibling;
            nextPanel = handle.nextElementSibling;
            prevW     = prevPanel.getBoundingClientRect().width;
            nextW     = nextPanel.getBoundingClientRect().width;
            handle.classList.add('active');
            document.body.style.userSelect = 'none';
            document.body.style.cursor     = 'col-resize';
        });
        document.addEventListener('mousemove', e => {
            if (!handle.classList.contains('active')) return;
            const total   = prevW + nextW;
            const newPrev = Math.max(160, Math.min(total - 160, prevW + (e.clientX - startX)));
            prevPanel.style.flex  = 'none';
            prevPanel.style.width = newPrev + 'px';
            nextPanel.style.flex  = 'none';
            nextPanel.style.width = (total - newPrev) + 'px';
        });
        document.addEventListener('mouseup', () => {
            if (handle.classList.contains('active')) {
                handle.classList.remove('active');
                document.body.style.userSelect = '';
                document.body.style.cursor     = '';
            }
        });
    });
}

// ─── Data Dragon ─────────────────────────────────────────────────────────────
async function loadChampions() {
    try {
        const verRes = await fetch('https://ddragon.leagueoflegends.com/api/versions.json');
        state.version = (await verRes.json())[0];
        const champRes = await fetch(
            `https://ddragon.leagueoflegends.com/cdn/${state.version}/data/en_US/champion.json`
        );
        state.champions = Object.values((await champRes.json()).data)
            .map(c => ({ id: c.id, name: c.name, image: c.image.full }))
            .sort((a,b) => a.name.localeCompare(b.name));
    } catch {
        document.getElementById('championGrid').innerHTML =
            '<div class="loading-msg">Failed to load champions.</div>';
    }
}

function imgUrl(c) {
    return `https://ddragon.leagueoflegends.com/cdn/${state.version}/img/champion/${c.image}`;
}
function imgUrlById(id) {
    const c = getChamp(id);
    return c ? imgUrl(c) : '';
}
function getChamp(id)  { return state.champions.find(c => c.id === id); }
function isBanned(id)  { return state.bans.includes(id); }
function filterRoster() {
    const q = document.getElementById('searchBox').value.trim().toLowerCase();
    return q ? state.champions.filter(c => c.name.toLowerCase().includes(q)) : state.champions;
}

// ─── Render: Bans ────────────────────────────────────────────────────────────
function renderBans() {
    const zone  = document.getElementById('bansZone');
    const empty = document.getElementById('bansEmpty');
    zone.querySelectorAll('.ban-champ').forEach(el => el.remove());
    if (!state.bans.length) { empty.style.display = ''; return; }
    empty.style.display = 'none';
    state.bans.forEach(cid => {
        const c = getChamp(cid);
        if (!c) return;
        const div = document.createElement('div');
        div.className = 'ban-champ';
        div.innerHTML = `<img src="${imgUrl(c)}" alt="${c.name}" title="${c.name}">
            <button class="rm-btn" onclick="removeBan('${c.id}')">×</button>`;
        zone.appendChild(div);
    });
}

// ─── Render: Roster ──────────────────────────────────────────────────────────
function renderRoster(list) {
    const grid = document.getElementById('championGrid');
    document.getElementById('champCount').textContent =
        `${list.length} champion${list.length !== 1 ? 's' : ''}`;
    if (!list.length) { grid.innerHTML = '<div class="loading-msg">No results</div>'; return; }
    grid.innerHTML = list.map(c => `
        <div class="roster-champ ${isBanned(c.id) ? 'banned' : ''}"
             draggable="true" data-id="${c.id}" data-source="roster">
            <img src="${imgUrl(c)}" alt="${c.name}" loading="lazy">
            <div class="tip">${c.name}</div>
        </div>`).join('');
    grid.querySelectorAll('.roster-champ').forEach(el => el.addEventListener('dragstart', onDragStart));
}

// ─── Render: All Comps ───────────────────────────────────────────────────────
function getPoolTag(champId, ri) {
    // Prefer the tag from the member whose role matches the slot's role
    if (ri !== undefined) {
        const roleVal = ROLE_VALS[ri];
        const m = state.members.find(m => m.role === roleVal);
        if (m) {
            const item = m.pool.find(p => p.id === champId);
            if (item) return item.tag || '';
        }
    }
    // Fallback: first member who has the champ
    for (const m of state.members) {
        const item = m.pool.find(p => p.id === champId);
        if (item) return item.tag || '';
    }
    return '';
}

// ═══════════════════════════════════════════════════════════════════════════════
// DRAFT LOGIC
// ═══════════════════════════════════════════════════════════════════════════════

function startSeries(format) {
    draftStaged = null; draftHoverPreview = null;
    draft.active      = true;
    draft.format      = format;
    draft.currentGame = 1;
    draft.blueSide    = 'home';
    draft.fearless    = [];
    draft.games       = [];
    draft.slots       = Array(20).fill(null);
    draft.cursor      = 0;
    scheduleSaveImmediate();
    renderDraftTab();
}

function endSeries() {
    if (!confirm('End the series? All draft progress will be cleared.')) return;
    draftStaged = null; draftHoverPreview = null;
    draft.active      = false;
    draft.format      = null;
    draft.currentGame = 1;
    draft.blueSide    = 'home';
    draft.fearless    = [];
    draft.games       = [];
    draft.slots       = Array(20).fill(null);
    draft.cursor      = 0;
    scheduleSaveImmediate();
    renderDraftTab();
}

function flipSides() {
    draft.blueSide = draft.blueSide === 'home' ? 'away' : 'home';
    scheduleSave();
    renderDraftTab();
}

// Which champIds are currently banned in this draft (bans phase only, not fearless)
function currentDraftBans() {
    const banned = [];
    for (let i = 0; i < draft.cursor; i++) {
        if (DRAFT_SEQ[i].a === 'ban' && draft.slots[i]) banned.push(draft.slots[i]);
    }
    return banned;
}

// All champIds unavailable for picking right now
function unavailableChamps() {
    const set = new Set(draft.fearless);
    draft.slots.forEach(id => { if (id) set.add(id); });
    if (draftStaged) set.add(draftStaged);
    return set;
}

// Hover (transient mouse preview) — just updates the active slot ghost, no commit
function draftHoverEnter(champId) {
    if (draftStaged) return; // staged takes priority
    if (draft.cursor >= 20) return;
    if (unavailableChamps().has(champId)) return;
    draftHoverPreview = champId;
    renderDraftBoard();
}
function draftHoverLeave() {
    if (draftStaged) return;
    draftHoverPreview = null;
    renderDraftBoard();
}

// Stage a champion (click) — sticky preview, greyed out in picker, Lock In to commit
function draftStageChamp(champId) {
    if (draft.cursor >= 20) return;
    const unavail = unavailableChamps();
    // Allow re-staging the same champ (toggle off)
    if (draftStaged === champId) {
        draftStaged = null;
        draftHoverPreview = null;
        renderDraftStatus();
        renderDraftPicker();
        renderDraftBoard();
        renderDraftPools();
        renderDraftCompsRef();
        return;
    }
    if (unavail.has(champId)) return;
    draftStaged = champId;
    draftHoverPreview = null;
    // Clear search
    const s = document.getElementById('draftSearch');
    if (s) s.value = '';
    renderDraftStatus();
    renderDraftPicker();
    renderDraftBoard();
    renderDraftPools();
    renderDraftCompsRef();
}

// Lock In — commit the staged champion to the current draft slot
function draftLockIn() {
    const id = draftStaged;
    if (!id || draft.cursor >= 20) return;
    draftStaged = null;
    draftHoverPreview = null;
    draft.slots[draft.cursor] = id;
    draft.cursor++;
    scheduleSave();
    renderDraftTab();
}

// Undo last pick/ban
function draftUndo() {
    if (draft.cursor === 0) return;
    draftStaged = null;
    draftHoverPreview = null;
    draft.cursor--;
    draft.slots[draft.cursor] = null;
    scheduleSave();
    renderDraftTab();
}

// Commit game: add all picks to fearless, move to next game
function commitGame() {
    if (draft.cursor < 20) return;
    // Show winner modal
    document.getElementById('winnerGameLabel').textContent =
        `Game ${draft.currentGame} — Who Won?`;
    document.getElementById('winnerOverlay').style.display = 'flex';
}

function recordWinner(winner) {
    document.getElementById('winnerOverlay').style.display = 'none';

    // Get picks from current game
    const bluePicks = BLUE_PICK_SLOTS.map(i => draft.slots[i]).filter(Boolean);
    const redPicks  = RED_PICK_SLOTS.map(i  => draft.slots[i]).filter(Boolean);
    const blueBans  = BLUE_BAN_SLOTS.map(i  => draft.slots[i]).filter(Boolean);
    const redBans   = RED_BAN_SLOTS.map(i   => draft.slots[i]).filter(Boolean);

    // Map blue/red to home/away
    const isHomeBlue = draft.blueSide === 'home';
    const homePicks  = isHomeBlue ? bluePicks : redPicks;
    const awayPicks  = isHomeBlue ? redPicks  : bluePicks;

    draft.games.push({
        num:    draft.currentGame,
        winner: winner,
        picks:  { blue: bluePicks, red: redPicks },
        bans:   { blue: blueBans,  red: redBans  },
    });

    // Add all played champions to fearless
    const played = [...bluePicks, ...redPicks];
    played.forEach(id => { if (!draft.fearless.includes(id)) draft.fearless.push(id); });

    draft.currentGame++;
    draft.slots  = Array(20).fill(null);
    draft.cursor = 0;

    scheduleSaveImmediate();
    renderDraftTab();
}

// ─── Render: Draft Tab ───────────────────────────────────────────────────────
function renderDraftTab() {
    renderDraftPools();
    renderDraftCompsRef();

    const setup  = document.getElementById('draftSetup');
    const active = document.getElementById('draftActive');

    if (!draft.active) {
        setup.style.display  = 'flex';
        active.style.display = 'none';
        return;
    }
    setup.style.display  = 'none';
    active.style.display = 'flex';

    // Series label
    const maxGames = draft.format;
    document.getElementById('draftSeriesLabel').textContent =
        `Game ${draft.currentGame} · BO${draft.format}`;

    // Score
    const homeWins = draft.games.filter(g => {
        if (g.winner === 'home') return true;
        if (g.winner === 'away') return false;
        return false;
    }).length;
    const awayWins = draft.games.filter(g => g.winner === 'away').length;
    document.getElementById('draftScore').textContent =
        `HOME ${homeWins} — ${awayWins} AWAY`;

    // Fearless row
    const fearlessEl = document.getElementById('fearlessChamps');
    if (draft.fearless.length === 0) {
        fearlessEl.innerHTML = '<span style="color:#2a2a2a;font-size:11px">None yet</span>';
    } else {
        fearlessEl.innerHTML = draft.fearless.map(id => {
            const c = getChamp(id);
            return c ? `<img class="fearless-champ" src="${imgUrl(c)}" title="${c.name}">` : '';
        }).join('');
    }

    // Flip button: only active before draft starts (cursor === 0)
    document.getElementById('flipBtn').disabled = draft.cursor > 0;

    // Draft board
    renderDraftBoard();

    // Status bar
    renderDraftStatus();

    // Champion picker
    renderDraftPicker();
}

function renderDraftBoard() {
    const isHomeBlue = draft.blueSide === 'home';
    const homeTeam   = isHomeBlue ? 'blue' : 'red';
    const awayTeam   = isHomeBlue ? 'red'  : 'blue';

    const homeBanSlots  = isHomeBlue ? BLUE_BAN_SLOTS  : RED_BAN_SLOTS;
    const homePickSlots = isHomeBlue ? BLUE_PICK_SLOTS : RED_PICK_SLOTS;
    const awayBanSlots  = isHomeBlue ? RED_BAN_SLOTS   : BLUE_BAN_SLOTS;
    const awayPickSlots = isHomeBlue ? RED_PICK_SLOTS  : BLUE_PICK_SLOTS;

    function cellClass(slotIdx, action) {
        if (draft.cursor !== slotIdx) return '';
        const team = DRAFT_SEQ[slotIdx].t; // 'blue' or 'red'
        return action === 'ban'
            ? (team === 'blue' ? 'blue-active' : 'red-active')
            : (team === 'blue' ? 'blue-active' : 'red-active');
    }

    function banCell(slotIdx) {
        const id  = draft.slots[slotIdx];
        const cls = cellClass(slotIdx, 'ban');
        if (id) {
            const c = getChamp(id);
            return `<div class="draft-ban-cell ${cls}">${c ? `<img src="${imgUrl(c)}" title="${c.name}">` : '×'}</div>`;
        }
        const previewId = draftStaged || draftHoverPreview;
        if (draft.cursor === slotIdx && previewId) {
            const c = getChamp(previewId);
            return `<div class="draft-ban-cell ${cls}" style="opacity:.45;border-style:dashed">${c ? `<img src="${imgUrl(c)}" title="${c.name}">` : '🚫'}</div>`;
        }
        return `<div class="draft-ban-cell ${cls}">🚫</div>`;
    }

    function pickCell(slotIdx, pickNum) {
        const id  = draft.slots[slotIdx];
        const cls = cellClass(slotIdx, 'pick');
        if (id) {
            const c = getChamp(id);
            const fearCls = draft.fearless.includes(id) ? 'fearless' : '';
            return `<div class="draft-pick-cell ${cls} ${fearCls}">
                ${c ? `<img src="${imgUrl(c)}" title="${c.name}">
                       <div class="pick-name">${c.name}</div>` : '<span>?</span>'}
            </div>`;
        }
        // Show hover/staged preview in active slot
        const previewId = draftStaged || draftHoverPreview;
        if (draft.cursor === slotIdx && previewId) {
            const c = getChamp(previewId);
            return `<div class="draft-pick-cell ${cls} preview">
                ${c ? `<img src="${imgUrl(c)}" title="${c.name}">
                       <div class="pick-name">${c.name}</div>` : ''}
            </div>`;
        }
        return `<div class="draft-pick-cell ${cls}"><span class="pick-num">P${pickNum}</span></div>`;
    }

    const homeBans  = homeBanSlots.map(i => banCell(i)).join('');
    const awayBans  = awayBanSlots.map(i => banCell(i)).join('');
    const homePicks = homePickSlots.map((si, pi) => pickCell(si, pi+1)).join('');
    const awayPicks = awayPickSlots.map((si, pi) => pickCell(si, pi+1)).join('');

    const homeColor = homeTeam === 'blue' ? 'blue' : 'red';
    const awayColor = awayTeam === 'blue' ? 'blue' : 'red';

    document.getElementById('draftBoard').innerHTML = `
        <div class="draft-team-col">
            <div class="draft-team-label ${homeColor}">HOME · ${homeTeam === 'blue' ? 'Blue Side' : 'Red Side'}</div>
            <div class="draft-bans-row">${homeBans}</div>
            <div class="draft-picks-col">${homePicks}</div>
        </div>
        <div class="draft-vs"><span class="draft-vs-label">VS</span></div>
        <div class="draft-team-col red-col">
            <div class="draft-team-label ${awayColor}" style="text-align:right">AWAY · ${awayTeam === 'blue' ? 'Blue Side' : 'Red Side'}</div>
            <div class="draft-bans-row" style="flex-direction:row-reverse">${awayBans}</div>
            <div class="draft-picks-col" style="align-items:flex-end">${awayPicks}</div>
        </div>`;
}

function renderDraftStatus() {
    const cursor       = draft.cursor;
    const gameStartBtn = document.getElementById('gameStartBtn');
    const lockInBar    = document.getElementById('lockInBar');
    const lockInName   = document.getElementById('lockInChampName');

    // Lock In bar visibility
    if (draftStaged && cursor < 20) {
        lockInBar.style.display = 'flex';
        lockInName.textContent  = getChamp(draftStaged)?.name || draftStaged;
    } else {
        lockInBar.style.display = 'none';
    }

    if (cursor >= 20) {
        document.getElementById('draftTurnLabel').innerHTML =
            'Draft complete — ready to <span>start the game</span>';
        gameStartBtn.disabled = false;
        return;
    }

    gameStartBtn.disabled = true;
    const step       = DRAFT_SEQ[cursor];
    const isHomeBlue = draft.blueSide === 'home';
    const team       = (step.t === 'blue') === isHomeBlue ? 'HOME' : 'AWAY';
    const color      = step.t === 'blue' ? '#4e9eff' : '#ff5555';
    const action     = step.a === 'ban' ? 'banning' : 'picking';
    document.getElementById('draftTurnLabel').innerHTML =
        `<span style="color:${color};font-weight:700">${team}</span> is ${action}
         <button class="draft-btn" style="margin-left:10px" onclick="draftUndo()">↩ Undo</button>`;
}

function renderDraftPicker() {
    const q       = (document.getElementById('draftSearch')?.value || '').trim().toLowerCase();
    const unavail = unavailableChamps();
    let list = state.champions;
    if (q) list = list.filter(c => c.name.toLowerCase().includes(q));

    const grid = document.getElementById('draftChampGrid');
    if (!grid) return;

    const done = draft.cursor >= 20;
    grid.innerHTML = list.map(c => {
        const off     = unavail.has(c.id) || done;
        const staged  = !off && draftStaged === c.id;
        return `<div class="draft-roster-champ ${off ? 'unavailable' : ''} ${staged ? 'staged' : ''}"
                     onclick="${off ? '' : `draftStageChamp('${c.id}')`}"
                     onmouseenter="${off ? '' : `draftHoverEnter('${c.id}')`}"
                     onmouseleave="${off ? '' : `draftHoverLeave()`}">
            <img src="${imgUrl(c)}" alt="${c.name}" loading="lazy">
            <div class="tip">${c.name}</div>
        </div>`;
    }).join('');
}

function renderDraftPools() {
    const container = document.getElementById('draftMembersContainer');
    if (!container) return;
    const unavail = unavailableChamps();

    container.innerHTML = state.members.map(m => {
        const display = sortedPool(m.pool);
        if (!display.length) return `
            <div class="draft-member-row">
                <div class="draft-member-name">${escHtml(m.name)}<br>
                    <span style="font-size:10px;color:#444">${getRoleDisplay(m.role)}</span>
                </div>
                <div style="color:#2a2a2a;font-size:11px">No pool</div>
            </div>`;
        return `
            <div class="draft-member-row">
                <div class="draft-member-name">${escHtml(m.name)}<br>
                    <span style="font-size:10px;color:#444">${getRoleDisplay(m.role)}</span>
                </div>
                <div class="draft-member-pool">
                    ${display.map(item => {
                        const c = getChamp(item.id);
                        if (!c) return '';
                        const isFearless = draft.fearless.includes(c.id);
                        const isDraftBan = currentDraftBans().includes(c.id);
                        const isUnavail  = unavailableChamps().has(c.id);
                        const isAvail    = !isFearless && !isDraftBan && !isUnavail && draft.cursor < 20;
                        const isStaged   = draftStaged === c.id;
                        return `<div class="draft-pool-champ ${isFearless ? 'fearless-banned' : ''} ${isDraftBan ? 'draft-banned' : ''} ${isStaged ? 'staged-pool' : ''} ${isAvail ? 'available' : ''}"
                                     data-tag="${item.tag||''}"
                                     ${isAvail ? `onclick="draftStageChamp('${c.id}')" onmouseenter="draftHoverEnter('${c.id}')" onmouseleave="draftHoverLeave()"` : ''}>
                            <img src="${imgUrl(c)}" title="${c.name}">
                            ${(item.badges||[]).length ? `<div class="pool-badges">${(item.badges||[]).map(b=>`<span class="pool-badge">${BADGE_ICONS[b]||b}</span>`).join('')}</div>` : ''}
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
    }).join('');
}

function renderDraftCompsRef() {
    const container = document.getElementById('draftCompsContainer');
    if (!container) return;
    container.innerHTML = state.comps.map((comp, ci) => `
        <div class="comp-block">
            <div class="comp-header">
                <span style="font-weight:700;font-size:12px;color:#aaa">${escHtml(comp.name)}</span>
            </div>
            <div class="comp-slots">
                ${ROLES.slice(0,5).map((role, ri) => {
                    const ids    = comp.slots[ri] || [];
                    const isCore = comp.core?.[ri] ?? false;
                    return `<div class="role-col ${isCore ? 'core' : ''}">
                        <div class="role-label">${role}</div>
                        <div class="role-drop-zone ${ids.length ? 'has-champs' : ''}">
                            ${ids.length
                                ? ids.map(cid => {
                                    const c = getChamp(cid);
                                    if (!c) return '';
                                    const isUnavail = unavailableChamps().has(c.id) || draft.cursor >= 20;
                                    const isStaged  = draftStaged === c.id;
                                    const cbKey     = `${ri}:${c.id}`;
                                    const cbBadges  = (comp.champBadges||{})[cbKey] || [];
                                    return `<div class="comp-champ ${isStaged ? 'staged-comp' : ''} ${!isUnavail ? 'draft-comp-champ-clickable' : ''}"
                                                 data-tag="${getPoolTag(c.id, ri)}" title="${c.name}"
                                                 ${!isUnavail ? `onclick="draftStageChamp('${c.id}')" onmouseenter="draftHoverEnter('${c.id}')" onmouseleave="draftHoverLeave()"` : ''}>
                                        <img src="${imgUrl(c)}" alt="${c.name}" ${isUnavail ? 'style="filter:grayscale(100%) brightness(.3);opacity:.4"' : ''}>
                                        ${cbBadges.length ? `<div class="comp-badges">${cbBadges.map(b=>`<span class="comp-badge">${BADGE_ICONS[b]||b}</span>`).join('')}</div>` : ''}
                                    </div>`;
                                }).join('')
                                : '<span class="slot-placeholder">+</span>'}
                        </div>
                    </div>`;
                }).join('')}
            </div>
            ${(() => {
                const threats = comp.threats || [];
                const isOpen  = openThreats.has(ci);
                return `<button class="threats-toggle" onclick="toggleThreats(${ci})">
                    <span class="t-arrow">${isOpen ? '▼' : '▶'}</span>
                    ☠ Threats ${threats.length ? `<span style="color:#e74c3c">(${threats.length})</span>` : ''}
                </button>
                ${isOpen ? `<div class="threats-drop" style="pointer-events:none">
                    ${threats.map(tid => {
                        const tc = getChamp(tid);
                        return tc ? `<div class="threat-champ"><img src="${imgUrl(tc)}" title="${tc.name}"></div>` : '';
                    }).join('') || '<span style="color:#2a2a2a;font-size:11px">None</span>'}
                </div>` : ''}`;
            })()}
        </div>`).join('');
}

// ─── Tag Picker ───────────────────────────────────────────────────────────────
const BADGE_ICONS = { blind:'👁', comfort:'🔥', star:'⭐' };

function openTagPicker(e, memberIdx, champId) {
    e.stopPropagation();
    const rect   = e.currentTarget.getBoundingClientRect();
    const picker = document.getElementById('tagPicker');
    picker.style.left = rect.left + 'px';
    picker.style.top  = (rect.bottom + 5) + 'px';
    picker.classList.add('open');
    tagPickerTarget = { memberIdx, champId };
    updateBadgePickerState();
}
function updateBadgePickerState() {
    if (!tagPickerTarget) return;
    const item   = state.members[tagPickerTarget.memberIdx].pool.find(p => p.id === tagPickerTarget.champId);
    const badges = item?.badges || [];
    document.getElementById('badgeBlind').classList.toggle('active',   badges.includes('blind'));
    document.getElementById('badgeComfort').classList.toggle('active', badges.includes('comfort'));
    document.getElementById('badgeStar').classList.toggle('active',    badges.includes('star'));
}
function toggleBadge(badge) {
    if (!tagPickerTarget) return;
    const item = state.members[tagPickerTarget.memberIdx].pool.find(p => p.id === tagPickerTarget.champId);
    if (!item) return;
    if (!item.badges) item.badges = [];
    const idx = item.badges.indexOf(badge);
    if (idx === -1) item.badges.push(badge); else item.badges.splice(idx, 1);
    updateBadgePickerState();
    renderMembers();
    scheduleSave();
    // keep picker open so multiple badges can be toggled
}
function openCompBadgePicker(e, ci, ri, champId) {
    if (e.target.classList.contains('rm-btn')) return;
    e.stopPropagation();
    closeTagPicker();
    const rect   = e.currentTarget.getBoundingClientRect();
    const picker = document.getElementById('compBadgePicker');
    picker.style.left = rect.left + 'px';
    picker.style.top  = (rect.bottom + 4) + 'px';
    picker.classList.add('open');
    compBadgeTarget = { ci, ri, champId };
    updateCompBadgePickerState();
}
function updateCompBadgePickerState() {
    if (!compBadgeTarget) return;
    const { ci, ri, champId } = compBadgeTarget;
    const key    = `${ri}:${champId}`;
    const badges = (state.comps[ci].champBadges || {})[key] || [];
    document.getElementById('cbBlind').classList.toggle('active',   badges.includes('blind'));
    document.getElementById('cbComfort').classList.toggle('active', badges.includes('comfort'));
    document.getElementById('cbStar').classList.toggle('active',    badges.includes('star'));
}
function toggleCompBadge(badge) {
    if (!compBadgeTarget) return;
    const { ci, ri, champId } = compBadgeTarget;
    const key = `${ri}:${champId}`;
    if (!state.comps[ci].champBadges) state.comps[ci].champBadges = {};
    const badges = state.comps[ci].champBadges[key] || [];
    const idx = badges.indexOf(badge);
    if (idx === -1) badges.push(badge); else badges.splice(idx, 1);
    state.comps[ci].champBadges[key] = badges;
    updateCompBadgePickerState();
    renderAllComps();
    scheduleSave();
}
function closeCompBadgePicker() {
    document.getElementById('compBadgePicker').classList.remove('open');
    compBadgeTarget = null;
}
document.addEventListener('click', e => {
    if (!e.target.closest('#compBadgePicker')) closeCompBadgePicker();
});

function setTag(tag) {
    if (!tagPickerTarget) return;
    const item = state.members[tagPickerTarget.memberIdx].pool
        .find(p => p.id === tagPickerTarget.champId);
    if (item) { item.tag = tag; renderMembers(); scheduleSave(); }
    closeTagPicker();
}
function closeTagPicker() {
    document.getElementById('tagPicker').classList.remove('open');
    tagPickerTarget = null;
}
document.addEventListener('click', e => { if (!e.target.closest('#tagPicker')) closeTagPicker(); });

// ─── Bans ─────────────────────────────────────────────────────────────────────
function onDropBan(e) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragData) return;
    if (!state.bans.includes(dragData.champId)) {
        state.bans.push(dragData.champId);
        renderBans(); renderRoster(filterRoster()); renderMembers(); renderAllComps();
        scheduleSave();
    }
    dragData = null;
}
function removeBan(champId) {
    state.bans = state.bans.filter(id => id !== champId);
    renderBans(); renderRoster(filterRoster()); renderMembers(); renderAllComps();
    scheduleSave();
}
function clearBans() {
    if (!state.bans.length) return;
    state.bans = [];
    renderBans(); renderRoster(filterRoster()); renderMembers(); renderAllComps();
    scheduleSave();
}

// ─── Comp Management ─────────────────────────────────────────────────────────
function addComp() {
    state.comps.push({ name:`Comp ${state.comps.length+1}`, slots:[[],[],[],[],[],[]], core:[false,false,false,false,false,false], threats:[], champBadges:{} });
    renderAllComps(); scheduleSave();
}
function deleteComp(idx) {
    if (state.comps.length === 1) return;
    state.comps.splice(idx, 1);
    renderAllComps(); scheduleSave();
}

// ─── Drag & Drop ─────────────────────────────────────────────────────────────
function onDragStart(e) {
    closeTagPicker();
    const el = e.currentTarget;
    dragData = { champId:el.dataset.id, source:el.dataset.source, memberIdx: el.dataset.member != null ? +el.dataset.member : null };
    e.dataTransfer.effectAllowed = 'copy';
    e.dataTransfer.setData('text/plain', el.dataset.id);
}
function onDragOver(e)     { if (!dragData) return; e.preventDefault(); e.dataTransfer.dropEffect='copy'; e.currentTarget.classList.add('drag-over'); }
function onPoolBgDragOver(e, mi) {
    if (!dragData) return;
    if (dragData?.source === 'pool' && dragData?.memberIdx === mi) return;
    e.preventDefault(); e.dataTransfer.dropEffect='copy'; e.currentTarget.classList.add('drag-over');
}
function onDragLeave(e)    { e.currentTarget.classList.remove('drag-over'); }
function onPoolChampDragOver(e, mi) {
    if (!dragData || dragData.source !== 'pool' || dragData.memberIdx !== mi) return;
    e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.add('insert-before');
}
function onPoolChampDragLeave(e) { e.currentTarget.classList.remove('insert-before'); }

function onDropReorder(e, mi, targetId) {
    e.preventDefault(); e.stopPropagation(); e.currentTarget.classList.remove('insert-before');
    if (!dragData) return;
    if (dragData.source !== 'pool' || dragData.memberIdx !== mi) {
        const pool = state.members[mi].pool;
        if (!pool.find(p => p.id === dragData.champId)) {
            pool.push({ id:dragData.champId, tag:'' });
            renderMembers(); scheduleSave();
        }
        dragData = null; return;
    }
    if (dragData.champId === targetId) { dragData = null; return; }
    const m = state.members[mi];
    const sorted = sortedPool(m.pool);
    const from = sorted.findIndex(p => p.id === dragData.champId);
    const to   = sorted.findIndex(p => p.id === targetId);
    if (from === -1 || to === -1) { dragData = null; return; }
    const [moved] = sorted.splice(from, 1);
    sorted.splice(to, 0, moved);
    m.pool = sorted;
    renderMembers(); scheduleSave();
    dragData = null;
}

function onDropPool(e, mi) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (!dragData) return;
    if (dragData.source === 'pool' && dragData.memberIdx === mi) { dragData = null; return; }
    const pool = state.members[mi].pool;
    if (!pool.find(p => p.id === dragData.champId)) {
        pool.push({ id:dragData.champId, tag:'' });
        renderMembers(); scheduleSave();
    }
    dragData = null;
}

function onDropComp(e, ci, ri) {
    e.preventDefault(); e.currentTarget.classList.remove('drag-over');
    if (!dragData) return;
    const slot = state.comps[ci].slots[ri];
    if (!slot.includes(dragData.champId)) {
        slot.push(dragData.champId);
        renderAllComps(); scheduleSave();
    }
    dragData = null;
}

// ─── Comp Slot Champion Reorder ──────────────────────────────────────────────
function onCompChampDragStart(e, ci, ri, champId) {
    dragData = { champId, source:'comp-slot', compIdx:ci, roleIdx:ri };
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', champId);
    e.stopPropagation();
}
function onCompChampDragOver(e, ci, ri) {
    if (!dragData || dragData.source !== 'comp-slot' || dragData.compIdx !== ci || dragData.roleIdx !== ri) return;
    e.preventDefault();
    e.stopPropagation();
    e.currentTarget.classList.add('insert-before');
}
function onCompChampDragLeave(e) {
    e.currentTarget.classList.remove('insert-before');
}
function onDropCompReorder(e, ci, ri, targetId) {
    e.preventDefault();
    e.stopPropagation();
    e.currentTarget.classList.remove('insert-before');
    if (!dragData) return;
    const slot = state.comps[ci].slots[ri];
    if (dragData.source === 'comp-slot' && dragData.compIdx === ci && dragData.roleIdx === ri) {
        const from = slot.indexOf(dragData.champId);
        const to   = slot.indexOf(targetId);
        if (from !== -1 && to !== -1 && from !== to) {
            slot.splice(from, 1);
            slot.splice(to, 0, dragData.champId);
            renderAllComps();
            scheduleSave();
        }
    } else if (dragData.champId && !slot.includes(dragData.champId)) {
        const to = slot.indexOf(targetId);
        slot.splice(to !== -1 ? to : slot.length, 0, dragData.champId);
        renderAllComps();
        scheduleSave();
    }
    dragData = null;
}

// ─── Comp Reorder Drag ───────────────────────────────────────────────────────
function onCompDragStart(e, ci) {
    compDragSrc = ci;
    e.dataTransfer.effectAllowed = 'move';
    e.dataTransfer.setData('text/plain', `comp:${ci}`);
    e.stopPropagation();
}
function onCompBlockDragOver(e, ci) {
    if (compDragSrc === null) return;
    e.preventDefault();
    e.stopPropagation();
    e.dataTransfer.dropEffect = 'move';
    e.currentTarget.classList.add('comp-drag-over');
}
function onCompBlockDragLeave(e) {
    e.currentTarget.classList.remove('comp-drag-over');
}
function onCompBlockDrop(e, ci) {
    e.currentTarget.classList.remove('comp-drag-over');
    if (compDragSrc === null || compDragSrc === ci) { compDragSrc = null; return; }
    e.preventDefault();
    e.stopPropagation();
    const [moved] = state.comps.splice(compDragSrc, 1);
    state.comps.splice(ci, 0, moved);
    collapsedComps.clear();
    compDragSrc = null;
    renderAllComps();
    scheduleSave();
}
document.addEventListener('dragend', () => { compDragSrc = null; });

function toggleCoreRole(ci, ri) {
    if (!state.comps[ci].core) state.comps[ci].core = [false,false,false,false,false,false];
    state.comps[ci].core[ri] = !state.comps[ci].core[ri];
    renderAllComps();
    scheduleSave();
}

function toggleThreats(ci) {
    if (openThreats.has(ci)) openThreats.delete(ci);
    else openThreats.add(ci);
    renderAllComps();
    renderDraftCompsRef();
}
function onDropThreats(e, ci) {
    e.preventDefault();
    e.currentTarget.classList.remove('drag-over');
    if (!dragData) return;
    const threats = state.comps[ci].threats || (state.comps[ci].threats = []);
    if (!threats.includes(dragData.champId)) {
        threats.push(dragData.champId);
        renderAllComps();
        scheduleSave();
    }
    dragData = null;
}
function removeThreat(ci, champId) {
    state.comps[ci].threats = (state.comps[ci].threats || []).filter(id => id !== champId);
    renderAllComps();
    scheduleSave();
}

function toggleComp(ci) {
    if (collapsedComps.has(ci)) collapsedComps.delete(ci);
    else collapsedComps.add(ci);
    renderAllComps();
}

// ─── Remove ──────────────────────────────────────────────────────────────────
function removeFromSlot(ci, ri, champId) {
    state.comps[ci].slots[ri] = state.comps[ci].slots[ri].filter(id => id !== champId);
    renderAllComps(); scheduleSave();
}
function removeFromPool(mi, champId) {
    state.members[mi].pool = state.members[mi].pool.filter(p => p.id !== champId);
    renderMembers(); scheduleSave();
}

// ─── Delegated saves ─────────────────────────────────────────────────────────
document.getElementById('membersContainer').addEventListener('change', scheduleSave);
document.getElementById('compsContainer').addEventListener('change', scheduleSave);
document.getElementById('searchBox').addEventListener('input', () => renderRoster(filterRoster()));

// ─── Util ─────────────────────────────────────────────────────────────────────
function escHtml(s) {
    return s.replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

init();
</script>

<div style="position:fixed;bottom:8px;right:10px;font-size:10px;color:#333;pointer-events:none;z-index:9999;letter-spacing:1px;">v4</div>
</body>
